model_name_or_path: "models/Qwen2.5-0.5B-Instruct"
train_jsonl: "data/processed/train_with_canary.jsonl"
output_root: "outputs/experiments"
epochs: 1
batch_size: 2
grad_accum: 8
lr: 2.0e-4
max_len: 512
seed: 0
logging_steps: 10
save_steps: 100
