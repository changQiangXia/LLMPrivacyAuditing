baselines:
  - name: "base_model"
    description: "基础模型，不做 LoRA 微调，直接执行审计"
    enabled: true
  - name: "lora_standard"
    description: "标准 LoRA 训练，使用插入 canary 的训练集"
    enabled: true
  - name: "lora_no_canary"
    description: "LoRA 训练，使用不插入 canary 的训练集"
    enabled: true
  - name: "lora_dedup"
    description: "LoRA 训练，开启 dedup"
    enabled: true
  - name: "decode_safe"
    description: "推理阶段防护 baseline，仅用于补充对比"
    enabled: false

main_ablations:
  - name: "num_canaries"
    values: [50, 100, 200]
  - name: "canary_repeats"
    values: [1, 3, 5]
  - name: "epochs"
    values: [1, 2, 3]
  - name: "lr"
    values: [1.0e-4, 2.0e-4, 5.0e-4]
  - name: "lora_r"
    values: [8, 16, 32]

supplementary_ablations:
  - name: "max_len"
    values: [256, 512, 1024]
  - name: "lora_alpha"
    values: [16, 32, 64]
  - name: "lora_dropout"
    values: [0.0, 0.05, 0.1]
  - name: "target_modules"
    values:
      - ["q_proj", "k_proj", "v_proj", "o_proj"]
      - ["q_proj", "v_proj"]
  - name: "dedup"
    values: [false, true]
  - name: "num_samples_per_prefix"
    values: [20, 50, 100]
  - name: "temperature"
    values: [0.7, 0.9, 1.0]
  - name: "top_p"
    values: [0.9, 0.95]
  - name: "num_reference"
    values: [500, 1000, 2000]
  - name: "neigh_k"
    values: [3, 5, 8]
  - name: "word_drop"
    values: [0.05, 0.1, 0.2]
